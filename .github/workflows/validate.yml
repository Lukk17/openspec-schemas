name: validate-schemas

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate schemas with OpenSpec CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install OpenSpec CLI
        run: npm install --global @fission-ai/openspec@latest

      - name: Print OpenSpec version
        run: openspec --version

      - name: Discover schemas
        id: discover
        run: |
          set -euo pipefail
          schemas=$(find . -maxdepth 2 -name schema.yaml -not -path './node_modules/*' -not -path './.git/*' | sed 's|^\./||' | sed 's|/schema\.yaml$||' | sort)
          echo "Found schemas:"
          echo "$schemas"
          if [ -z "$schemas" ]; then
            echo "::error::No schema.yaml found at repo root (depth <= 2)"
            exit 1
          fi
          {
            echo "schemas<<EOF"
            echo "$schemas"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # The discovered schema list is passed through an env var, not interpolated
      # into the script body, so a directory name with shell metacharacters
      # (possible on a fork PR) is treated as data, never executed.
      - name: Validate each schema in a temp OpenSpec project
        env:
          SCHEMAS: ${{ steps.discover.outputs.schemas }}
        run: |
          set -euo pipefail
          repo_root=$(pwd)
          while IFS= read -r schema_dir || [ -n "$schema_dir" ]; do
            [ -z "$schema_dir" ] && continue
            schema_name=$(basename "$schema_dir")
            echo ""
            echo "::group::Validate $schema_name"
            tmp=$(mktemp -d)
            cd "$tmp"
            openspec init --tools none > /dev/null
            mkdir -p openspec/schemas
            cp -r "$repo_root/$schema_dir" openspec/schemas/
            openspec schema validate "$schema_name" --verbose
            cd "$repo_root"
            rm -rf "$tmp"
            echo "::endgroup::"
          done <<< "$SCHEMAS"

      - name: Round-trip new change with each schema
        env:
          SCHEMAS: ${{ steps.discover.outputs.schemas }}
        run: |
          set -euo pipefail
          repo_root=$(pwd)
          while IFS= read -r schema_dir || [ -n "$schema_dir" ]; do
            [ -z "$schema_dir" ] && continue
            schema_name=$(basename "$schema_dir")
            echo ""
            echo "::group::Round-trip $schema_name"
            tmp=$(mktemp -d)
            cd "$tmp"
            openspec init --tools none > /dev/null
            mkdir -p openspec/schemas
            cp -r "$repo_root/$schema_dir" openspec/schemas/
            openspec new change "ci-roundtrip-$schema_name" --schema "$schema_name" --description "CI round-trip probe"
            # Assert the change scaffold landed, then check that no schema
            # placeholder leaked into the resolved template paths.
            change_dir=$(find openspec/changes -maxdepth 2 -name .openspec.yaml | head -1 | xargs -r dirname)
            test -n "$change_dir" || { echo "::error::Change scaffold missing .openspec.yaml"; exit 1; }
            openspec templates --schema "$schema_name" > templates.out
            cat templates.out
            if grep -E '\{[A-Za-z0-9_-]+\}' templates.out; then
              echo "::error::Unsubstituted placeholder leaked into a template path"
              exit 1
            fi
            cd "$repo_root"
            rm -rf "$tmp"
            echo "::endgroup::"
          done <<< "$SCHEMAS"
