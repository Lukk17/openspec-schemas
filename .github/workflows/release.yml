name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install OpenSpec CLI
        run: npm install --global @fission-ai/openspec@latest

      - name: Validate all schemas before releasing
        run: |
          set -euo pipefail
          repo_root=$(pwd)
          # NUL-delimited so paths with spaces never word-split.
          while IFS= read -r -d '' schema_yaml; do
            schema_dir=$(dirname "$schema_yaml")
            schema_name=$(basename "$schema_dir")
            echo "::group::Validate $schema_name"
            tmp=$(mktemp -d)
            cd "$tmp"
            openspec init --tools none > /dev/null
            mkdir -p openspec/schemas
            cp -r "$repo_root/$schema_dir" openspec/schemas/
            openspec schema validate "$schema_name"
            # Same placeholder-leak gate the validate workflow runs, so a tag
            # pushed on an unmerged commit can't ship a leaked path.
            openspec templates --schema "$schema_name" > templates.out
            if grep -E '\{[A-Za-z0-9_-]+\}' templates.out; then
              echo "::error::Unsubstituted placeholder leaked into a $schema_name template path"
              exit 1
            fi
            cd "$repo_root"
            rm -rf "$tmp"
            echo "::endgroup::"
          done < <(find . -maxdepth 2 -name schema.yaml -not -path './node_modules/*' -not -path './.git/*' -print0)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --verify-tag
