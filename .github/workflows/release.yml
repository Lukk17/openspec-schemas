name: release

# Manual release. Trigger from the Actions tab (or `gh workflow run release.yml`),
# enter the version, and the job validates it, validates every schema, then
# creates the tag and the GitHub release. No hand-tagging required.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version — semver, leading v optional (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Validate, tag, and release
    runs-on: ubuntu-latest

    steps:
      # Read the user input via env, never interpolated into the script body,
      # so a malformed or hostile value is treated as data, not executed.
      - name: Validate version input
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION_INPUT#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::'$VERSION_INPUT' is not valid semver (expected MAJOR.MINOR.PATCH, e.g. 0.1.0)"
            exit 1
          fi
          echo "TAG=v$version" >> "$GITHUB_ENV"
          echo "Release tag will be: v$version"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag does not already exist
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag $TAG already exists. Pick a higher version."
            exit 1
          fi
          latest=$(git tag --list 'v*' --sort=-v:refname | head -1)
          echo "Latest existing tag: ${latest:-<none>}. New tag: $TAG."

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install OpenSpec CLI
        run: npm install --global @fission-ai/openspec@latest

      - name: Validate all schemas before releasing
        run: |
          set -euo pipefail
          repo_root=$(pwd)
          # NUL-delimited so paths with spaces never word-split.
          while IFS= read -r -d '' schema_yaml; do
            schema_dir=$(dirname "$schema_yaml")
            schema_name=$(basename "$schema_dir")
            echo "::group::Validate $schema_name"
            tmp=$(mktemp -d)
            cd "$tmp"
            openspec init --tools none > /dev/null
            mkdir -p openspec/schemas
            cp -r "$repo_root/$schema_dir" openspec/schemas/
            openspec schema validate "$schema_name"
            # Same placeholder-leak gate the validate workflow runs, so a release
            # can't ship a leaked path.
            openspec templates --schema "$schema_name" > templates.out
            if grep -E '\{[A-Za-z0-9_-]+\}' templates.out; then
              echo "::error::Unsubstituted placeholder leaked into a $schema_name template path"
              exit 1
            fi
            cd "$repo_root"
            rm -rf "$tmp"
            echo "::endgroup::"
          done < <(find . -maxdepth 2 -name schema.yaml -not -path './node_modules/*' -not -path './.git/*' -print0)

      # Extract the matching CHANGELOG.md section body so the release notes
      # are the curated prose the maintainer wrote, not GitHub's mechanical
      # commit-title list. Tries (in order): "## [vX.Y.Z]", "## [X.Y.Z]",
      # then "## [Unreleased]". Fails the release if the chosen section has
      # no body — that catches the "forgot to write a changelog entry" case.
      - name: Extract release notes from CHANGELOG.md
        env:
          VERSION_BARE: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION_BARE#v}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md not found at repo root"
            exit 1
          fi
          # Prefix-match so headings can carry a trailing date — e.g. the
          # CHANGELOG heading "## [v0.1.0] - 2026-05-28" matches lookup
          # "## [v0.1.0]" (the character after the prefix must be space or
          # EOL, so "## [v0.1.0-rc1]" does NOT match "## [v0.1.0]").
          extract() {
            awk -v hdg="$1" '
              index($0, hdg) == 1 {
                tail = substr($0, length(hdg) + 1)
                if (tail == "" || substr(tail, 1, 1) == " ") { found = 1; next }
              }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md
          }
          notes=""
          source=""
          for heading in "## [v$version]" "## [$version]" "## [Unreleased]"; do
            candidate=$(extract "$heading")
            if [ -n "$(printf '%s' "$candidate" | tr -d '[:space:]')" ]; then
              notes=$candidate
              source=$heading
              break
            fi
          done
          if [ -z "$source" ]; then
            echo "::error::CHANGELOG.md has no entry for v$version, $version, or [Unreleased]"
            exit 1
          fi
          echo "Release notes sourced from: $source"
          printf '%s\n' "$notes" > release-notes.md
          echo "----- release-notes.md -----"
          cat release-notes.md
          echo "----- end -----"

      - name: Create and push tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$TAG" --title "$TAG" --notes-file release-notes.md --verify-tag
