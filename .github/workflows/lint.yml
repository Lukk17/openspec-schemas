name: lint-markdown

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      # Anonymous checkout of the public repo — no GITHUB_TOKEN (least privilege).
      - name: Checkout (anonymous)
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://github.com/$REPO.git"
          git -c protocol.version=2 fetch --no-tags --depth 1 origin "$SHA"
          git checkout -q FETCH_HEAD
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install markdownlint-cli2
        run: npm install --global markdownlint-cli2
      # Lint only the files we author. The .agents/, .claude/, .codex/, and
      # .opencode/ trees are upstream content imported from agent-standards;
      # they have their own CI and their own conventions.
      - name: Run markdownlint
        run: |
          markdownlint-cli2 \
            "**/*.md" \
            "#node_modules" \
            "#.agents/**" \
            "#.claude/**" \
            "#.codex/**" \
            "#.opencode/**" \
            "#AGENTS.md.example"

  link-check:
    name: lychee link check
    runs-on: ubuntu-latest
    steps:
      # Anonymous checkout of the public repo — no GITHUB_TOKEN (least privilege).
      - name: Checkout (anonymous)
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://github.com/$REPO.git"
          git -c protocol.version=2 fetch --no-tags --depth 1 origin "$SHA"
          git checkout -q FETCH_HEAD
      - name: Run lychee
        # SHA-pinned (the only third-party action); Dependabot bumps it. Comment tracks the tag.
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # lychee 0.23+ removed --exclude-mail; mail is excluded by default.
          # Exclude upstream agent-standards content (kept in sync by its own
          # CI) and the openspec/schemas/*/templates/ trees (deliberate
          # {N}, {capability} placeholders that resolve only after a
          # consumer scaffolds them).
          args: >-
            --no-progress
            --verbose
            --max-redirects 5
            --exclude-loopback
            --exclude-path .agents
            --exclude-path .claude
            --exclude-path .codex
            --exclude-path .opencode
            --exclude-path docs/AGENT_TOOLING.md
            --exclude-path openspec/schemas/e2e-runbooks/templates
            './**/*.md'
          fail: true
