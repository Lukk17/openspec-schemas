name: lint-markdown

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install markdownlint-cli2
        run: npm install --global markdownlint-cli2
      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md" "#node_modules"

  link-check:
    name: lychee link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose --max-redirects 5 --exclude-loopback --exclude-mail './**/*.md'
          fail: true
